<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Recipes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        header{
            a {
                display: flex;
                justify-content: center;
                margin-bottom: 20px;
                text-decoration: none;
                color: #007BFF;
                font-size: 30px;
                font-weight: bold;
            }
            a:hover {
                transition: 0.5s ease-in-out;
                color: black;
            }
        }
        section{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            & h1{
                font-size: 40px;
                color: #333;
            }
            & img{
                width: 400px;
                height: auto;
                border-radius: 10px;
            }
            & img:hover {
                    transition: 0.5s ease-in-out;
                    transform: scale(1.05);
                }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html">Home</a>
    </header>
    <section>
        <h1>Lasagna</h1>
        <img src="../images/lasagna.avif" alt="Delicious Lasagna">
    </section>
    
</body>
</html>
