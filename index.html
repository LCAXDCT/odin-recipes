<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Recipes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0px;
            padding: 0px;
            border: 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px;
            & h1{
                font-size: 50px;
                color: #333;
                margin-bottom: 100px;
            }
            & div{
                display: flex;
                gap: 50px;
                & img{
                    width: 300px;
                    height: 200px;
                    border-radius: 10px;
                    transition: 0.5s ease-in-out;
                }
            }
            & a{
                    text-decoration: none;
                    color: #2b2b2b;
                    font-size: 20px;
                    font-weight: bold;
                    margin-bottom: 50px;
                    margin-top: -20px;
                }
            & .card{
                padding: 10px;
                border-radius: 10px;
                align-items: center;
                background-color:rgb(231, 112, 9);
                display: flex;
                flex-direction: column;
            }
            & .card:hover{
                transition: 0.5s ease-in-out;
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>
    <h1>Odin Recipes</h1>
    <div>
        <a href="recipes/lasagna.html" class="card">
            <img src="images/lasagna.avif" alt="">
            <p>Lasagna</p>
        </a>
        <a href="recipes/garlic_and_oil_pasta.html" class="card">
            <img src="images/iStock-1226428506.png" alt="">
            <p>Garlic and Oil Pasta</p>
        </a>
    </div>
</body>
</html>
